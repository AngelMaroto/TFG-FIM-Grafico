name: fim_monitor
description: FIM Gráfico para Auditoría de Sistemas Linux - TFG DAM 2025-2026
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- Estado: BLoC ---
  flutter_bloc: ^8.1.4
  bloc: ^8.1.3
  equatable: ^2.0.5

  # --- Red: HTTP + WebSocket ---
  http: ^1.2.1
  stomp_dart_client: 3.0.1   # STOMP sobre WebSocket (igual que Spring)

  # --- Inyección de dependencias ---
  get_it: ^7.7.0

  # --- Grafo de nodos interactivo ---
  graphview: ^1.2.0

  # --- Navegación ---
  go_router: ^13.2.0

  # --- Utilidades ---
  intl: ^0.19.0               # Formateo de fechas
  freezed_annotation: ^2.4.1  # Modelos inmutables
  json_annotation: ^4.9.0     # Serialización JSON

  # --- UI ---
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10
  shimmer: ^3.0.0             # Skeleton loaders

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Generadores de código ---
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
